<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#002c6b"/>

  <!-- Brand "S" lettermark — bold, centered -->
  <text
    x="256"
    y="320"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="300"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="#ffffff"
    letter-spacing="-8"
  >S</text>

  <!-- QR corner markers — bottom-right quadrant, subtly evokes scanning -->
  <!-- Top-left corner of marker group -->
  <g transform="translate(336, 336)" fill="none" stroke="#5b9bd5" stroke-width="14" stroke-linecap="square">
    <!-- Top-left corner -->
    <polyline points="0,40 0,0 40,0"/>
    <!-- Bottom-right corner -->
    <polyline points="96,56 96,96 56,96"/>
  </g>
</svg>
