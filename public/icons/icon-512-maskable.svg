<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon — content scaled to 80% safe zone (51px inset on each side).
    Platforms that apply adaptive icon masking (circle, squircle, etc.) will
    crop to the outer edge; all meaningful content lives within the safe zone.
  -->
  <!-- Full bleed background (no rounded corners — platform applies mask shape) -->
  <rect width="512" height="512" fill="#002c6b"/>
  <!--
    "S" scaled to fit within safe zone (410×410 centered at 256,256).
    Original font-size 300 at 512px → scaled to ~234 at the safe zone.
    Vertical center adjusted accordingly.
  -->
  <text
    x="256"
    y="295"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-weight="700"
    font-size="236"
    text-anchor="middle"
    fill="#ffffff"
  >S</text>
  <!-- QR corner accent (inside safe zone) -->
  <g transform="translate(346,346)" fill="none" stroke="#5b9bd5" stroke-width="12" stroke-linecap="square">
    <polyline points="0,32 0,0 32,0"/>
    <polyline points="76,44 76,76 44,76"/>
  </g>
</svg>
